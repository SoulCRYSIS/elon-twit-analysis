# Fly.io — https://fly.io/docs/reference/configuration/
#
# Matches your .env intent (lines 2–8); PK is NOT stored here — use a secret:
#   fly secrets set PK=your_private_key_hex
#
# 1. fly apps create polymarket-elon-twit   # or rename `app` below
# 2. fly secrets set PK=...
# 3. fly deploy
#
# Worker only (no HTTP). Use a Dockerfile with WORKDIR + pip install, e.g.:
#   CMD ["python", "trading_bot.py"]
# Or rely on [processes] overriding the image CMD after `fly launch` generates an image.

app = "polymarket-elon-twit"
primary_region = "nrt" # Tokyo, Japan — https://fly.io/docs/reference/regions/

[build]

[env]
  DRY_RUN = "false"
  POLYMARKET_SIGNATURE_TYPE = "2"
  POLYMARKET_FUNDER = "0xB0911137Ed5Dd72D7eE4C7B5699d233B54cE53da"
  BUY_MARKET_MAX_PRICE_DIFF = "0.1"
  BUY_MARKET_MIN_USD = "1.00"

[processes]
  bot = "python trading_bot.py"

[[vm]]
  size = "shared-cpu-1x"
  processes = ["bot"]
