# fly.toml app configuration file generated for elon-twit-analysis on 2026-04-21T10:26:19Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# Persistent disk: create the volume with the CLI (not created by fly.toml alone):
#   ./scripts/fly-storage.sh
# or: fly volumes create bot_data -a elon-twit-analysis -r nrt -s 3 -y

app = "elon-twit-analysis"
primary_region = "nrt"

[build]

# Mount must stay in fly.toml so fly deploy attaches the volume to Machines.

[env]
  DATA_DIR = "/data"
  # Same tree as local ./data/polymarket — must live on the volume, not under /app from the image.
  POLYMARKET_DATA_DIR = "/data/polymarket"

[[mounts]]
  source = "bot_data"
  destination = "/data"
  processes = ["app"]

# Command for the default `app` process group (Fly Machines). No [http_service]:
# this workload is a long-running worker, not an HTTP server on :8080.

[processes]
  app = "python trading_bot.py"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 2048
